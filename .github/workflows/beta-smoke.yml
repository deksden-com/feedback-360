name: Beta Smoke

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: beta-smoke-develop
  cancel-in-progress: false

jobs:
  beta-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Wait for beta health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS https://beta.go360go.ru/api/health >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "beta health endpoint is not ready"
          exit 1
      - name: Run beta smoke suite
        env:
          PLAYWRIGHT_BASE_URL: https://beta.go360go.ru
        run: pnpm --filter @feedback-360/web test:smoke:beta
