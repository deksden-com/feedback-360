<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e3b8a",
                        "background-light": "#f6f6f8",
                        "background-dark": "#121620",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Logo Section -->
<div class="flex items-center justify-center gap-3">
<div class="size-10 flex items-center justify-center text-primary">
<svg class="w-full h-full" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight">HR Core / 360-dfb</h2>
</div>
<!-- Main Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Decorative Header Image -->
<div class="h-32 bg-primary/10 flex items-center justify-center overflow-hidden" data-alt="Abstract corporate blue geometric pattern background" style="background-image: linear-gradient(135deg, rgba(30,59,138,0.1) 0%, rgba(30,59,138,0.2) 100%);">
<span class="material-symbols-outlined text-primary/30 text-6xl">lock_open</span>
</div>
<div class="p-8 flex flex-col gap-6">
<!-- Text Content -->
<div class="flex flex-col gap-2">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Вход в систему</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                        Введите ваш рабочий email для получения ссылки для входа.
                    </p>
</div>
<!-- Form -->
<div class="flex flex-col gap-4">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Рабочий email</span>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 text-[20px]">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-sm" placeholder="example@company.com" type="email"/>
</div>
</label>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-6 rounded-lg transition-colors flex items-center justify-center gap-2 group">
<span>Отправить ссылку</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">send</span>
</button>
</div>
<!-- Footer Note -->
<div class="flex gap-3 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-lg">
<span class="material-symbols-outlined text-primary text-[20px] shrink-0">info</span>
<p class="text-slate-500 dark:text-slate-400 text-[13px] leading-snug">
                        Ссылка будет отправлена только если ваш email есть в HR-справочнике компании.
                    </p>
</div>
</div>
</div>
<!-- External Footer -->
<div class="flex justify-center gap-6">
<a class="text-slate-400 dark:text-slate-600 hover:text-primary dark:hover:text-primary text-xs font-medium transition-colors" href="#">Поддержка</a>
<a class="text-slate-400 dark:text-slate-600 hover:text-primary dark:hover:text-primary text-xs font-medium transition-colors" href="#">Политика конфиденциальности</a>
</div>
</div>
</body></html>
